<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Subway Safety Control Center</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* === 전체 레이아웃 (화면 꽉 채움 & 전체 스크롤 방지) === */
        html, body {
            height: 100%;
            margin: 0;
            background-color: #050505; /* Deep Black */
            color: #e0e0e0;
            font-family: 'Noto Sans KR', sans-serif; 
            overflow: hidden; /* [중요] 브라우저 전체 스크롤 제거 */
            user-select: none;
            display: flex;
            flex-direction: column;
        }

        /* 1. 상단 헤더 */
        .header-bar { 
            height: 65px; 
            background-color: #111; 
            border-bottom: 1px solid #333; 
            padding: 0 30px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            flex-shrink: 0;
            z-index: 10;
        }
        .system-title { font-size: 1.4rem; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
        .status-indicator { font-size: 0.8rem; color: #00ff00; font-weight: bold; margin-left: 15px; text-transform: uppercase; letter-spacing: 1px; }

        /* 2. 메인 컨테이너 */
        .container-fluid.main-layout {
            flex: 1; 
            display: flex;
            flex-direction: column;
            padding: 20px; 
            gap: 20px; 
            min-height: 0; 
        }

        /* 3. 상단: 카메라 영역 */
        .row-cams {
            flex: 0 0 auto; 
            display: flex;
            gap: 20px;
            margin: 0;
        }
        .col-cam {
            flex: 1;
            padding: 0;
        }

        /* 4. 하단: 정보 영역 (남은 공간 꽉 채움) */
        .row-info {
            flex: 1; 
            display: flex;
            gap: 20px;
            margin: 0;
            min-height: 0; 
        }
        .col-scenario { flex: 2; padding: 0; height: 100%; }
        .col-log { flex: 1; padding: 0; height: 100%; display: flex; flex-direction: column; }

        /* === 카드 디자인 === */
        .card { 
            background-color: #141414; 
            border: 1px solid #2a2a2a; 
            border-radius: 8px; 
            height: 100%; 
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6); 
            overflow: hidden;
        }
        .card-header { 
            background-color: #1c1c1c; 
            border-bottom: 1px solid #333; 
            font-weight: 700; color: #ccc; 
            font-size: 1rem; 
            padding: 12px 20px; 
            display: flex; justify-content: space-between; align-items: center; 
            flex-shrink: 0;
        }
        .card-body {
            flex: 1; 
            position: relative;
            padding: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        /* === 카메라 === */
        .cam-wrapper { 
            position: relative; 
            background: #000; 
            min-height: 360px; 
            display: flex; justify-content: center; align-items: center;
        }
        .cam-feed { width: 100%; height: auto; display: block; }
        .cam-label { 
            position: absolute; top: 15px; left: 15px; 
            background: rgba(0, 0, 0, 0.7); color: #00ffea; 
            padding: 5px 10px; font-size: 0.8rem; font-weight: bold; 
            border-radius: 4px; border: 1px solid rgba(0, 255, 234, 0.4);
            pointer-events: none; 
        }

        /* === 시나리오 단계바 === */
        .scenario-content-wrapper {
            flex: 1; 
            display: flex;
            align-items: center; 
            justify-content: center;
            padding: 0 50px;
        }
        .progress-container { width: 100%; position: relative; }
        .progress-track { position: absolute; top: 35px; left: 0; right: 0; height: 6px; background: #2a2a2a; z-index: 0; border-radius: 3px; }
        .scenario-steps { display: flex; justify-content: space-between; position: relative; z-index: 1; }
        .step-item { text-align: center; width: 18%; opacity: 0.3; transition: all 0.4s ease; }
        .step-circle { width: 70px; height: 70px; margin: 0 auto 15px; background: #1a1a1a; border: 3px solid #444; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: #555; font-weight: 900; transition: all 0.4s ease; }
        .step-label { font-size: 1rem; color: #777; font-weight: 600; letter-spacing: -0.5px; }

        /* 활성/완료 디자인 */
        .active { opacity: 1; transform: scale(1.1); }
        .active .step-circle { background: #0d6efd; border-color: #0d6efd; color: #fff; box-shadow: 0 0 25px rgba(13, 110, 253, 0.5); }
        .active .step-label { color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.3); }
        .completed { opacity: 1; } 
        .completed .step-circle { background: #198754; border-color: #198754; color: #fff; } 
        .completed .step-label { color: #198754; }

        .scenario-footer { padding: 20px; border-top: 1px solid #222; background: #111; flex-shrink: 0; }

        /* === 로그 터미널 === */
        .log-terminal { 
            background-color: #080808; 
            color: #ccc; 
            font-family: 'Consolas', 'Monaco', monospace; 
            font-size: 0.95rem; 
            height: 100%; 
            overflow-y: auto; 
            padding: 15px; 
            line-height: 1.6; 
        }
        .log-entry { display: flex; margin-bottom: 5px; border-bottom: 1px solid #1a1a1a; padding-bottom: 2px;}
        .log-time { color: #555; margin-right: 15px; min-width: 80px; font-weight: bold; }
        .log-msg { flex: 1; word-break: break-all; }

        /* [로봇 구분 색상] */
        .log-sys .log-msg { color: #888; font-style: italic; }
        .log-robot-a .log-msg { color: #4dabf7; font-weight: bold; } /* Robot A: 파랑 */
        .log-robot-b .log-msg { color: #ff922b; font-weight: bold; } /* Robot B: 주황 */
        .log-emg .log-msg { color: #ff6b6b; font-weight: bold; } /* 응급상황: 빨강 */

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

        /* 버튼 스타일 */
        .btn-report { border: 1px solid #444; color: #bbb; background: #222; padding: 8px 18px; font-size: 0.9rem; margin-left: 10px; text-decoration: none; display: inline-block; border-radius: 4px; transition: 0.3s; }
        .btn-report:hover { background: #333; color: #fff; border-color: #888; }
        .btn-emergency { background: #5a1a1a; color: #ffadb6; border: 1px solid #842029; width: 100%; font-weight: 800; font-size: 1.2rem; padding: 18px; border-radius: 6px; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .btn-emergency:hover { background: #b02a37; color: #fff; box-shadow: 0 0 20px rgba(220, 53, 69, 0.6); transform: translateY(-2px); }
        .btn-emergency:active { transform: scale(0.98); }

        /* 제어 패널 스타일 */
        .hover-box { transition: background 0.2s; cursor: pointer; background: #1a1a1a; }
        .hover-box:hover { background: #2f2f2f; border-color: #666 !important; }
        .form-check-input:checked + label { color: #fff; }
        .target-panel { display: flex; flex-direction: column; gap: 15px; height: 100%; justify-content: center;}

        /* 타겟 컨트롤 패널 개선 스타일 */
        .target-select-card {
            background-color: #1a1a1a;
            border: 2px solid #333;
            border-radius: 8px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0.6; /* 미선택 시 약간 어둡게 */
        }
        
        /* 라디오 버튼 체크 시 스타일 (활성화 느낌 강조) */
        .btn-check:checked + .target-select-card {
            background-color: #222;
            border-color: #0d6efd; /* 선택된 테두리 색상 */
            opacity: 1.0;
            box-shadow: 0 0 15px rgba(13, 110, 253, 0.15);
        }

        /* 좌표 텍스트 스타일 */
        .coord-group { text-align: center; margin-top: 5px; }
        .coord-label { font-size: 0.8rem; color: #888; display: block; margin-bottom: 2px; }
        .coord-value { 
            font-family: 'Consolas', monospace; 
            font-size: 1.6rem; /* 폰트 크기 대폭 확대 */
            font-weight: 700; 
            letter-spacing: 1px;
        }
        .coord-unit { font-size: 0.9rem; color: #666; font-weight: normal; margin-left: 2px; }

        /* 상태 뱃지 위치 조정 */
        .status-badge { font-size: 0.75rem; padding: 4px 8px; border-radius: 4px; background: #333; color: #aaa; margin-bottom: 8px; }
    </style>
</head>
<body>

<div class="header-bar">
    <div class="d-flex align-items-center">
        <div class="system-title">지하철 안전 통합 관제</div>
        <span class="status-indicator">● SYSTEM ONLINE</span>
    </div>
    <div class="d-flex align-items-center">
        <span style="color:#666; font-size:0.9rem; margin-right: 10px;">OPERATOR:</span>
        <span style="color:#fff; font-weight:bold; margin-right: 25px;">{{ username }}</span>
        
        <a href="/history" class="btn btn-report">📊 운행 이력</a>
        <a href="/analytics" class="btn btn-report">📄 최신 보고서</a>
        <a href="/logout" class="btn btn-report">로그아웃</a>
    </div>
</div>

<div class="container-fluid main-layout">
    
    <div class="row row-cams">
        <div class="col-cam">
            <div class="card">
                <div class="card-header">
                    <span>CAM 01 : 승강장 안전 구역 </span>
                    <span class="badge bg-success">LIVE</span>
                </div>
                <div class="card-body cam-wrapper">
                    <span class="cam-label">REALTIME FEED</span>
                    <img src="/video/1" class="cam-feed" onclick="sendClick(1, event)" alt="CAM 1 - CONNECTING...">
                </div>
            </div>
        </div>
        <div class="col-cam">
            <div class="card">
                <div class="card-header">
                    <span>CAM 02 : 계단 진입로 </span>
                    <span class="badge bg-success">LIVE</span>
                </div>
                <div class="card-body cam-wrapper">
                    <span class="cam-label">REALTIME FEED</span>
                    <img src="/video/2" class="cam-feed" onclick="sendClick(2, event)" alt="CAM 2 - CONNECTING...">
                </div>
            </div>
        </div>
    </div>

    <div class="row row-info">
        
        <div class="col-scenario" style="display: flex; flex-direction: column; gap: 20px;">
    
            <div class="card" style="flex: 2; min-height: 0;">
                <div class="card-header">
                    <span>심정지 대응 시나리오 진행상황</span>
                </div>
                <div class="card-body p-0 d-flex flex-column justify-content-center">
                    <div class="scenario-content-wrapper" style="padding: 10px 50px;">
                        <div class="progress-container">
                            <div class="progress-track" style="top: 30px;"></div>
                            <div class="scenario-steps">
                                <div class="step-item active" id="step-1">
                                    <div class="step-circle" style="width: 50px; height: 50px; font-size: 1.2rem; margin-bottom: 5px;">1</div>
                                    <div class="step-label" style="font-size: 0.9rem;">상황 접수</div>
                                </div>
                                <div class="step-item" id="step-2">
                                    <div class="step-circle" style="width: 50px; height: 50px; font-size: 1.2rem; margin-bottom: 5px;">2</div>
                                    <div class="step-label" style="font-size: 0.9rem;">유닛 출동</div>
                                </div>
                                <div class="step-item" id="step-3">
                                    <div class="step-circle" style="width: 50px; height: 50px; font-size: 1.2rem; margin-bottom: 5px;">3</div>
                                    <div class="step-label" style="font-size: 0.9rem;">환자 발견</div>
                                </div>
                                <div class="step-item" id="step-4">
                                    <div class="step-circle" style="width: 50px; height: 50px; font-size: 1.2rem; margin-bottom: 5px;">4</div>
                                    <div class="step-label" style="font-size: 0.9rem;">구급대 진입</div>
                                </div>
                                <div class="step-item" id="step-5">
                                    <div class="step-circle" style="width: 50px; height: 50px; font-size: 1.2rem; margin-bottom: 5px;">5</div>
                                    <div class="step-label" style="font-size: 0.9rem;">상황 종료</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card" style="flex: 3; min-height: 0;">
                <div class="card-header">
                    <span>로봇 제어 및 명령 (Robot Command & Control) </span>
                </div>
                
                <div class="card-body p-3 d-flex flex-column gap-5">
    
                    <div class="row g-3" style="flex: 6; min-height: 0;">
                        
                        <div class="col-6" style="height: 100%;">
                            <input type="radio" class="btn-check" name="targetSource" id="srcYolo" value="yolo" checked>
                            <label class="target-select-card w-100 h-100" for="srcYolo">
                                <div id="badge-yolo" class="status-badge">AI 지능형 감지</div>
                                <div style="color: #00ff00; font-weight: bold; font-size: 1.0rem; margin-bottom: 3px;">AI Autonomous</div>
                                <div class="coord-group">
                                    <div id="val-yolo" class="coord-value" style="color: #fff; font-size: 1.3rem;">
                                        -- . --
                                    </div>
                                </div>
                            </label>
                        </div>

                        <div class="col-6" style="height: 100%;">
                            <input type="radio" class="btn-check" name="targetSource" id="srcManual" value="manual">
                            <label class="target-select-card w-100 h-100" for="srcManual">
                                <div id="badge-manual" class="status-badge">수동 좌표 지정</div>
                                <div style="color: #00d4ff; font-weight: bold; font-size: 1.0rem; margin-bottom: 3px;">Manual Targeting</div>
                                <div class="coord-group">
                                    <div id="val-manual" class="coord-value" style="color: #fff; font-size: 1.3rem;">
                                        -- . --
                                    </div>
                                </div>
                            </label>
                        </div>
                    </div>

                    <div class="row g-3" style="flex: 4; min-height: 0;">
                        <div class="col-6" style="height: 100%;">
                            <button class="btn btn-danger w-100 h-100 d-flex justify-content-center align-items-center gap-2 rounded-3 shadow-sm" 
                                    onclick="stopTask()" style="border: 1px solid #842029;">
                                <span style="font-size: 1.4rem;">🚨</span>
                                <div class="d-flex flex-column align-items-start" style="line-height: 1;">
                                    <span class="fw-bold" style="font-size: 1rem;">전체 비상 정지</span>
                                    <span style="font-size: 0.7rem; opacity: 0.7;">Emergency Stop</span>
                                </div>
                            </button>
                        </div>
                        <div class="col-6" style="height: 100%;">
                            <button class="btn btn-primary w-100 h-100 d-flex justify-content-center align-items-center gap-2 rounded-3 shadow-sm" 
                                    onclick="dispatchRobot()" style="border: 1px solid #0d6efd;">
                                <span style="font-size: 1.4rem;">📡</span>
                                <div class="d-flex flex-column align-items-start" style="line-height: 1;">
                                    <span class="fw-bold" style="font-size: 1rem;">출동 명령 하달</span>
                                    <span style="font-size: 0.7rem; opacity: 0.7;">Deploy Unit</span>
                                </div>
                            </button>
                        </div>
                    </div>

                </div>
            </div>
        </div>

        <div class="col-log">
            <div class="card">
                <div class="card-header">
                    <span>실시간 시스템 로그</span>
                </div>
                <div class="card-body p-0">
                    <div class="log-terminal" id="sys-logs">
                        </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 세션 시작 시간
    let sessionStartTime = sessionStorage.getItem('controlSessionStart');
    if (!sessionStartTime) {
        sessionStartTime = new Date().getTime();
        sessionStorage.setItem('controlSessionStart', sessionStartTime);
    }

    // 초기 로그 메시지
    window.onload = function() {
        const box = document.getElementById('sys-logs');
        if (!box.innerHTML.trim()) {
            const now = new Date();
            const timeStr = now.toTimeString().split(' ')[0];
            box.innerHTML = `<div class="log-entry log-sys"><span class="log-time">${timeStr}</span><span class="log-msg">시스템 가동 시작... 로봇 유닛 대기 중.</span></div>`;
        }
    };

    // 주기적 업데이트
    setInterval(updateStatus, 1000);

    function updateStatus() { 
        fetch('/api/status').then(res => res.json()).then(data => { 
            if (data.is_active === false) { 
                updateStepUI(1); 
            } else { 
                analyzeScenarioStage(data.logs.emergency); 
            }
            updateLogConsole(data.logs.emergency, data.logs.system); 
            if(data.targets) updateTargetInfo(data.targets);
        }); 
    }

    function analyzeScenarioStage(logs) {
        if (!logs || logs.length === 0) { 
            updateStepUI(1); 
            return; 
        }

        let lastA = "";
        let lastB = "";
        let globalEvent = "";

        for (let i = 0; i < logs.length; i++) {
            const msg = logs[i][1];
            if (!lastA && msg.includes("Robot A")) lastA = msg;
            if (!lastB && msg.includes("Robot B")) lastB = msg;
            if (!globalEvent && (msg.includes("도킹") || msg.includes("중단") || msg.includes("대기"))) globalEvent = msg;
            if (lastA && lastB && globalEvent) break;
        }

        const isBothDocked = (lastA && lastA.includes("도킹")) && (lastB && lastB.includes("도킹"));
        const isEmergency = globalEvent && globalEvent.includes("중단");
        const isStep4Active = lastB && (lastB.includes("함께") || lastB.includes("도킹"));
        
        let currentStage = 1;

        if (isBothDocked || isEmergency) { currentStage = 5; }
        else if (isStep4Active) { currentStage = 4; }
        else if (lastA && (lastA.includes("승객") || lastA.includes("함께") || lastA.includes("도킹"))) { currentStage = 3; }
        else if (lastA && (lastA.includes("AED") || lastA.includes("승객"))) { currentStage = 2; }
        else { currentStage = 1; }

        updateStepUI(currentStage);
    }

    function updateStepUI(stage) {
        for(let i=1; i<=5; i++) {
            const el = document.getElementById(`step-${i}`);
            el.classList.remove('active', 'completed');
            if(i < stage) { 
                el.classList.add('completed'); 
                el.querySelector('.step-circle').innerHTML = '✔'; 
            } else if (i === stage) { 
                el.classList.add('active'); 
                el.querySelector('.step-circle').innerText = i; 
            } else { 
                el.querySelector('.step-circle').innerText = i; 
            }
        }
    }

    function updateLogConsole(emerLogs, sysLogs) {
        const box = document.getElementById('sys-logs');
        let allLogs = [];

        if (emerLogs) {
            emerLogs.slice(0, 50).forEach(log => {
                let raw = log[1];
                let timeStr = "";
                let msg = raw;
                let sortTime = 0;
                try {
                    const match = raw.match(/\[(.*?)\]/);
                    if(match) {
                        timeStr = match[1].split(' ')[1]; 
                        msg = raw.substring(match[0].length).trim();
                        sortTime = new Date(match[1]).getTime();
                    }
                } catch(e) {}
                if(sortTime) allLogs.push({ raw: log[1], time: timeStr.split('.')[0], msg: msg, st: sortTime });
            });
        }
        if (sysLogs) {
            sysLogs.slice(0, 20).forEach(log => {
                let timeStr = log[2].split(' ')[1];
                allLogs.push({ raw: log[1], time: timeStr.split('.')[0], msg: "[SYSTEM] " + log[1], st: new Date(log[2]).getTime() });
            });
        }

        allLogs.sort((a, b) => b.st - a.st);

        let html = '';
        let lastMsgByTopic = { 'RobotA': '', 'RobotB': '', 'EMG': '', 'SYS': '' };
        let chronoLogs = [...allLogs].reverse(); 
        let filteredLogs = [];

        chronoLogs.forEach(item => {
            if (item.st < sessionStartTime) return;
            let topic = 'SYS';
            let className = 'log-sys';
            if (item.raw.includes("Robot A")) { topic = 'RobotA'; className = 'log-robot-a'; }
            else if (item.raw.includes("Robot B")) { topic = 'RobotB'; className = 'log-robot-b'; }
            else if (item.raw.includes("응급") || item.raw.includes("구급대")) { topic = 'EMG'; className = 'log-emg'; }

            if (lastMsgByTopic[topic] === item.msg) return; 
            lastMsgByTopic[topic] = item.msg;
            filteredLogs.unshift({ ...item, className: className });
        });

        filteredLogs.forEach(item => {
            html += `<div class="log-entry ${item.className}"><span class="log-time">${item.time}</span><span class="log-msg">${item.msg}</span></div>`;
        });

        if (html && box.innerHTML !== html) {
            box.innerHTML = html;
        }
    }

    // [수정됨] 클릭 시 좌표와 함께 mode='manual'을 전송
    function sendClick(camId, event) {
        const width = 1280, height = 720;
        const rect = event.target.getBoundingClientRect();
        const x = (event.clientX - rect.left) * (width / rect.width);
        const y = (event.clientY - rect.top) * (height / rect.height);
        
        // 클릭하면 자동으로 MANUAL 모드로 UI 변경 (UX 개선)
        document.getElementById('srcManual').checked = true;

        fetch('/api/click', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                id: camId, 
                x: Math.round(x), 
                y: Math.round(y),
                mode: 'manual' // [중요] 모드 정보 추가
            })
        });
    }

    function stopTask() {
        fetch('/api/task_end', {method: 'POST'});
        console.log("Emergency Stop Signal Sent.");
    }

    function selectRadio(id) {
        document.getElementById(id).checked = true;
    }

    function updateTargetInfo(targets) {
        const elYoloVal = document.getElementById('val-yolo');
        const elYoloBadge = document.getElementById('badge-yolo');
        const elManualVal = document.getElementById('val-manual');
        const elManualBadge = document.getElementById('badge-manual');
        
        if (targets.yolo_active) {
            elYoloBadge.innerText = "DETECTED";
            elYoloBadge.classList.add('status-active');
            elYoloVal.innerHTML = `<span style="color:#00ff00;">X:${targets.yolo.x.toFixed(1)}</span><span style="color:#666; font-weight:lighter;">|</span><span style="color:#00ff00;">Y:${targets.yolo.y.toFixed(1)}</span>`;
        } else {
            elYoloBadge.innerText = "SEARCHING...";
            elYoloBadge.classList.remove('status-active');
            elYoloVal.innerHTML = `<span style="color:#555; font-size:1.2rem;">NO TARGET</span>`;
        }

        if (targets.manual && targets.manual.valid) {
            elManualBadge.innerText = "SET";
            elManualBadge.classList.add('status-active');
            elManualBadge.style.background = "#0dcaf0"; 
            elManualBadge.style.color = "#000";
            elManualVal.innerHTML = `<span style="color:#00d4ff;">X:${targets.manual.x.toFixed(1)}</span><span style="color:#666; font-weight:lighter;">|</span><span style="color:#00d4ff;">Y:${targets.manual.y.toFixed(1)}</span>`;
        } else {
            elManualBadge.innerText = "WAITING";
            elManualBadge.classList.remove('status-active');
            elManualBadge.style.background = "#333";
            elManualBadge.style.color = "#aaa";
            elManualVal.innerHTML = `<span style="color:#555; font-size:1.2rem;">CLICK CAM</span>`;
        }
    }

    // [수정됨] 존재하지 않는 ID 참조 오류 수정 (info-yolo -> val-yolo 등)
    function dispatchRobot() {
        const selectedMode = document.querySelector('input[name="targetSource"]:checked').value;
        const btn = document.querySelector('button[onclick="dispatchRobot()"]');

        if(selectedMode === 'yolo') {
            const txt = document.getElementById('val-yolo').innerText; // 수정됨
            if(txt.includes("NO TARGET")) { alert("❌ YOLO 감지된 환자가 없습니다."); return; }
        } else {
            const txt = document.getElementById('val-manual').innerText; // 수정됨
            if(txt.includes("CLICK CAM")) { alert("❌ 화면을 클릭하여 목표를 먼저 설정하세요."); return; }
        }

        fetch('/api/dispatch', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ mode: selectedMode })
        })
        .then(res => res.json())
        .then(data => {
            if(data.status === 'success') {
                const origHTML = btn.innerHTML;
                btn.innerHTML = "✅<br>전송됨";
                btn.classList.replace('btn-primary', 'btn-success');
                setTimeout(() => {
                    btn.innerHTML = origHTML;
                    btn.classList.replace('btn-success', 'btn-primary');
                }, 1500);
            } else {
                alert("출동 명령 실패: " + data.msg);
            }
        });
    }
</script>
</body>
</html>
